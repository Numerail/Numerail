name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── numerail core ──────────────────────────────────────────────────────
  core:
    name: "numerail ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/numerail

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test suite (253 tests)
        run: pytest tests/ -v --tb=short

      - name: Guarantee certification (46 tests)
        run: pytest tests/test_guarantee.py -v --tb=short

      - name: Proof checker (3,732 assertions)
        run: python proof/verify_proof.py

  # ── numerail-ext ──────────────────────────────────────────────────────
  ext:
    name: "numerail-ext ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: core
    defaults:
      run:
        working-directory: packages/numerail_ext

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core
        run: pip install -e "../numerail[dev]"

      - name: Install ext
        run: pip install -e ".[dev]"

      - name: Test suite (207 tests)
        run: pytest tests/ -v --tb=short
