[project]
name = "numerail-learn"
version = "0.1.0"
description = "Reinforcement learning from Numerail enforcement decisions — converts enforcement outputs into LLM training data"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "numerail>=5.0.0,<6.0.0",
    "numerail-ext>=0.4.0,<1.0.0",
    "numpy>=1.21",
]
keywords = [
    "ai-safety",
    "enforcement",
    "reinforcement-learning",
    "rlhf",
    "fine-tuning",
    "governance",
    "actuation",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/Numerail/Numerail"
Repository = "https://github.com/Numerail/Numerail"
Documentation = "https://github.com/Numerail/Numerail/blob/main/packages/numerail_learn/README.md"
"Bug Tracker" = "https://github.com/Numerail/Numerail/issues"
Changelog = "https://github.com/Numerail/Numerail/blob/main/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]
train = [
    "datasets>=2.0",
    "transformers>=4.30",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
numerail_learn = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
